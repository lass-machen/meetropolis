# Local development overrides - exposes ports for direct access
# Use with: docker compose -f docker-compose.prod.yml -f docker-compose.override.yml up

services:
  db:
    ports:
      - "5432:5432"
  server:
    ports:
      - "2567:2567"
    environment:
      # Disable secure cookie for HTTP localhost
      COOKIE_SECURE: "false"
      # Allow localhost CORS
      CORS_ORIGIN: "http://localhost:5173"
      # Use lenient rate limits for local testing
      RATE_LIMIT_DEV: "true"
  web:
    ports:
      - "5173:5173"
  livekit:
    # Use config file for proper NAT handling in Docker Desktop on macOS
    # --node-ip forces advertising 127.0.0.1 to clients
    command: ["--config", "/etc/livekit.yaml", "--bind", "0.0.0.0", "--node-ip", "127.0.0.1"]
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "7882:7882/udp"
