services:
  db:
    image: postgres:16
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meetropolis
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  server:
    image: node:24-bookworm-slim
    working_dir: /workspace
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 2567
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_EXTERNAL_URL: ${LIVEKIT_EXTERNAL_URL:-ws://localhost:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      NODE_ENV: development
      TRUST_PROXY: "true"
      # Safe local fallbacks to avoid crashes during local testing with this compose
      API_TOKEN_PEPPER: ${API_TOKEN_PEPPER:-dev-pepper-change-me}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174}
    command: sh -c "npm ci --include=dev && node apps/server/prisma/compose-schema.cjs && apps/server/node_modules/.bin/prisma generate --schema=apps/server/prisma/schema.composed.prisma && apps/server/node_modules/.bin/prisma db push --schema=apps/server/prisma/schema.composed.prisma && npm run -w @meetropolis/server prisma:seed && npm run -w @meetropolis/server start:dev"
    ports:
      - "2567:2567"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meetropolis-api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.meetropolis-api.entrypoints=websecure"
      - "traefik.http.routers.meetropolis-api.tls.certresolver=le"
      - "traefik.http.services.meetropolis-api.loadbalancer.server.port=2567"
      - "traefik.docker.network=traefik"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2567/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - default
      - traefik
    volumes:
      - ./:/workspace
      - server_node_modules:/workspace/node_modules

  web:
    image: node:24-bookworm-slim
    working_dir: /workspace
    env_file:
      - .env
    environment:
      VITE_API_BASE: ${VITE_API_BASE}
      VITE_LIVEKIT_URL: ${VITE_LIVEKIT_URL}
      VITE_HMR_HOST: localhost
      VITE_HMR_PROTOCOL: ws
    command: sh -c "npm ci && cd apps/web && npm run dev"
    ports:
      - "5173:5173"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meetropolis.rule=Host(`localhost`)"
      - "traefik.http.routers.meetropolis.entrypoints=websecure"
      - "traefik.http.routers.meetropolis.tls.certresolver=le"
      - "traefik.http.services.meetropolis.loadbalancer.server.port=5173"
      - "traefik.docker.network=traefik"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - default
      - traefik
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/node_modules

  livekit:
    image: livekit/livekit-server:latest
    # Use config file instead of --dev for proper NAT handling in Docker Desktop
    command: ["--config", "/etc/livekit.yaml", "--bind", "0.0.0.0"]
    env_file:
      - .env
    environment:
      LK_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LK_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      LK_NODE_IP: ${LK_NODE_IP:-127.0.0.1}
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "7882:7882/udp"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 15s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meetropolis-livekit.rule=Host(`livekit.localhost`)"
      - "traefik.http.routers.meetropolis-livekit.entrypoints=websecure"
      - "traefik.http.routers.meetropolis-livekit.tls.certresolver=le"
      - "traefik.http.services.meetropolis-livekit.loadbalancer.server.port=7880"
      - "traefik.docker.network=traefik"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default
      - traefik

volumes:
  db_data:
  server_node_modules:
  web_node_modules:

networks:
  traefik:
    external: true
    name: traefik
  default:
    driver: bridge
