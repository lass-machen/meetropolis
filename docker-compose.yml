services:
  db:
    image: postgres:15
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meetropolis
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  server:
    image: node:20
    working_dir: /workspace/apps/server
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 2567
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      NODE_ENV: production
      TRUST_PROXY: "true"
    command: sh -c "npm ci --include=dev && npx prisma generate && npx prisma db push && npx prisma db seed && npx tsx src/index.ts"
    ports:
      - "2567:2567"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - db
    volumes:
      - ./:/workspace
      - /workspace/node_modules

  web:
    image: node:20
    working_dir: /workspace/apps/web
    env_file:
      - .env
    environment:
      VITE_API_BASE: ${VITE_API_BASE}
      VITE_LIVEKIT_URL: ${VITE_LIVEKIT_URL}
    command: sh -c "npm ci && npm run build && npm run preview"
    ports:
      - "5173:5173"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - server
    volumes:
      - ./:/workspace
      - /workspace/node_modules

  livekit:
    image: livekit/livekit-server:latest
    command: ["--dev", "--bind", "0.0.0.0"]
    environment:
      LK_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LK_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      LK_NODE_IP: ${LK_NODE_IP:-127.0.0.1}
      # Wichtig für Docker Desktop (macOS): korrekte IP an Clients signalisieren
      LK_NAT_1_TO_1_IPS: ${LK_NAT_1_TO_1_IPS:-127.0.0.1}
      LK_RTC_USE_EXTERNAL_IP: ${LK_RTC_USE_EXTERNAL_IP:-true}
      # Optionale Explizitsetzung der RTC-Ports (gemappt unten)
      LK_RTC_TCP_PORT: ${LK_RTC_TCP_PORT:-7881}
      LK_RTC_UDP_PORT: ${LK_RTC_UDP_PORT:-7882}
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "7882:7882/udp"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
