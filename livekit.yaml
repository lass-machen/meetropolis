# LiveKit development configuration for Docker Desktop
# This config is needed because --dev mode doesn't properly handle NAT for Docker on macOS

port: 7880
log_level: info

rtc:
  tcp_port: 7881
  port_range_start: 7882
  port_range_end: 7882
  use_external_ip: false
  # Docker Desktop NAT requires explicit node-ip (set via --node-ip flag in docker-compose.override.yml)
  enable_loopback_candidate: true
  # Use ICE-lite for simpler ICE negotiation in local dev
  use_ice_lite: true

# Development API keys - needs to be 32+ chars for production but works for dev
keys:
  devkey: secret
