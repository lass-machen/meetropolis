# LiveKit development configuration for Docker Desktop
# This config is needed because --dev mode doesn't properly handle NAT for Docker on macOS

port: 7880
log_level: info

rtc:
  tcp_port: 7881
  # Single UDP port for Docker port mapping (range not practical with Docker Desktop)
  udp_port: 7882
  use_external_ip: false
  # Force advertising localhost IP for Docker Desktop on macOS
  # This is necessary because Docker Desktop doesn't support host networking
  ips:
    includes:
      - 127.0.0.1/32
  # Enable loopback for local development
  enable_loopback_candidate: true
  # Use ICE lite for faster connections
  use_ice_lite: true
  # Allow TCP fallback if UDP doesn't work
  allow_tcp_fallback: true

# Development API keys
keys:
  devkey: secret
