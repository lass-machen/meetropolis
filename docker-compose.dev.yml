# Development Configuration für lokale Entwicklung
# Optimiert für lokale Entwicklung ohne Traefik

networks:
  meetropolis-dev:
    driver: bridge

volumes:
  db_data_dev:
  npc_media_dev:

services:
  db:
    image: postgres:15
    container_name: meetropolis-db-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meetropolis
    ports:
      - "5434:5432"
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    networks:
      - meetropolis-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: node:20
    container_name: meetropolis-server-dev
    working_dir: /workspace/apps/server
    environment:
      LOG_LEVEL: info
      DATABASE_URL: postgresql://postgres:postgres@db:5432/meetropolis
      PORT: 2567
      LIVEKIT_URL: http://livekit:7880
      LIVEKIT_EXTERNAL_URL: ws://${HOST_IP:-localhost}:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      NODE_ENV: development
      TRUST_PROXY: "false"
      COOKIE_SECURE: "false"
      # CORS-Origin: localhost-Default fuer jeden Dev. Per env DEV_HOST=foo.local
      # ueberschreibbar, falls man den Stack vom Telefon o. AE. ueber den
      # Bonjour/mDNS-Hostnamen aufruft.
      CORS_ORIGIN: http://localhost:5174,http://localhost:5173,http://${DEV_HOST:-localhost}:5173,http://${DEV_HOST:-localhost}:5174
      # Stabilisiere Tokens in Dev: gleicher Pepper/Secret über Neustarts
      API_TOKEN_PEPPER: dev-pepper-change-me
      JWT_SECRET: dev-jwt-secret-change-me
      NPC_SERVICE_URL: http://host.docker.internal:3100
      NPC_SERVICE_SECRET: dev-npc-secret
      NPC_SERVER_URL: http://localhost:2567
      NPC_MEDIA_DIR: /data/npc-media
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BILLING_PUBLIC_URL: http://localhost:5174
      PRICING_URL: http://localhost:5174/#/pricing
      TEMPLATE_TENANT_SLUG: default
    command: sh -c "cd /workspace && npm install && npm run -w @meetropolis/shared build && npx prisma generate --schema=./apps/server/prisma/schema.prisma && npx prisma db push --schema=./apps/server/prisma/schema.prisma && npx prisma db seed --schema=./apps/server/prisma/schema.prisma && npm run -w @meetropolis/server start:dev"
    ports:
      - "2567:2567"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      livekit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:2567/readyz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\" "]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    networks:
      - meetropolis-dev
    volumes:
      - ./:/workspace
      - ./npc-media:/data/npc-media

  web:
    image: node:20
    container_name: meetropolis-web-dev
    working_dir: /workspace/apps/web
    environment:
      # Browser muss LiveKit erreichen koennen — nimmt die Host-Adresse, die
      # der Browser kennt (Default localhost; ueber env DEV_HOST=… ueberschreibbar).
      VITE_LIVEKIT_URL: ws://${DEV_HOST:-localhost}:7880
      VITE_HMR_HOST: ${DEV_HOST:-localhost}
      VITE_HMR_PROTOCOL: ws
      VITE_DEBUG_LOGS: "true"
      VITE_FEATURE_AV_SETTINGS: "true"
      VITE_FEATURE_VOICE_ISOLATION: client
      VITE_DEBUG_AUTOLOGIN: "false"
      # Proxy-Ziel im Container: spreche den Server-Dienst direkt an
      VITE_PROXY_TARGET: http://server:2567
    command: sh -c "cd /workspace && npm install && npm -w @meetropolis/web run dev -- --host 0.0.0.0"
    ports:
      - "5174:5173"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - server
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5173',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\" "]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    networks:
      - meetropolis-dev
    volumes:
      - ./:/workspace

  livekit:
    image: livekit/livekit-server:latest
    container_name: meetropolis-livekit-dev
    # --node-ip: IP advertised in WebRTC ICE candidates (LAN-Test: HOST_IP=<LAN-IP>)
    command: ["--dev", "--bind", "0.0.0.0", "--node-ip", "${HOST_IP:-127.0.0.1}"]
    environment:
      LK_LOG_LEVEL: info
      LK_API_KEY: devkey
      LK_API_SECRET: secret
      LK_NODE_IP: ${HOST_IP:-127.0.0.1}
      LK_RTC_USE_EXTERNAL_IP: "false"
      LK_RTC_TCP_PORT: 7881
      LK_RTC_UDP_PORT: 7882
      LK_PROMETHEUS_PORT: 9090
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "7882:7882/udp"
      - "9090:9090"
    # healthcheck optional (Image-Tools variieren); kann bei Bedarf ergänzt werden
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - meetropolis-dev

  grafana:
    image: grafana/grafana:10.4.10
    container_name: meetropolis-grafana-dev
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - meetropolis-dev
    depends_on:
      - server
      - livekit

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: meetropolis-prometheus-dev
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9095:9090"
    networks:
      - meetropolis-dev
    depends_on:
      - server
      - livekit

  loadtest:
    profiles: ["loadtest"]
    build:
      context: .
      dockerfile: apps/loadtest/Dockerfile
    container_name: meetropolis-loadtest
    environment:
      - API_BASE=http://server:2567
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      - USERS=30
      - RAMP=5
      - DURATION=90
      - MODE=node
    networks:
      - meetropolis-dev
    depends_on:
      server:
        condition: service_healthy
      livekit:
        condition: service_started
    command:
      - sh
      - -lc
      - >-
        until node -e "require('http').get('http://server:2567/readyz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"; do
          echo waiting for server...; sleep 2;
        done;
        npm run dev

  stripe-cli:
    profiles: ["stripe"]
    image: stripe/stripe-cli:latest
    container_name: meetropolis-stripe-cli
    command: >-
      listen
        --api-key ${STRIPE_SECRET_KEY}
        --forward-to http://server:2567/billing/webhook
        --log-level info
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    networks:
      - meetropolis-dev
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  npc-service:
    image: node:20
    container_name: meetropolis-npc-service
    working_dir: /workspace/apps/npc-service
    environment:
      SERVER_URL: http://server:2567
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      NPC_SERVICE_SECRET: dev-npc-secret
      NPC_MEDIA_DIR: /data/npc-media
      PORT: 3100
      LOG_LEVEL: info
    command: sh -c "cd /workspace && npm install && npm -w @meetropolis/npc-service run dev"
    ports:
      - "3100:3100"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      server:
        condition: service_healthy
      livekit:
        condition: service_started
    networks:
      - meetropolis-dev
    volumes:
      - ./:/workspace
      - ./npc-media:/data/npc-media
