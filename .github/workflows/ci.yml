name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint (budgets)
        run: npm run lint

      - name: Prisma generate
        run: npm run generate

      - name: Build (web + server)
        run: npm run build


