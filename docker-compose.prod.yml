version: '3.9'

services:
  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: builder
    working_dir: /workspace/apps/server
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PRISMA_SCHEMA: /workspace/apps/server/prisma/schema.prisma
    command: >-
      sh -lc "npx prisma migrate deploy --schema $${PRISMA_SCHEMA}"
    restart: 'no'

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: runner
    working_dir: /workspace/apps/server
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - '2567:2567'
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:2567/readyz\", r => process.exit(r.statusCode === 200 ? 0 : 1)).on(\"error\", () => process.exit(1))'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  default:
    name: meetropolis-prod

