appId: com.meetropolis.app
productName: Meetropolis
directories:
  output: dist-app
  buildResources: assets
files:
  - dist/**/*
extraResources:
  - from: ../../apps/web/dist
    to: web
mac:
  category: public.app-category.social-networking
  hardenedRuntime: true
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.inherit.plist
  gatekeeperAssess: true
  icon: assets/icon.icns
  extendInfo:
    NSCameraUsageDescription: Camera access is required for video conversations.
    NSMicrophoneUsageDescription: Microphone access is required for voice conversations.
    NSScreenCaptureUsageDescription: Screen capture is required for screen sharing.
asar: true
afterSign: ./scripts/afterSignHook.js


