<!DOCTYPE html>
<html>
<head>
  <title>Debug</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
    pre { background: #0d0d1a; padding: 10px; overflow: auto; max-height: 200px; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #4a5; color: white; border: none; }
    .error { color: #ff6b6b; }
    .success { color: #51cf66; }
    .info { color: #74c0fc; }
  </style>
</head>
<body>
  <h1>Meetropolis Debug</h1>
  
  <h2>1. Tauri Detection</h2>
  <pre id="tauri-info">Checking...</pre>
  
  <h2>2. Config from Rust</h2>
  <pre id="config-info">Checking...</pre>
  
  <h2>3. API Test</h2>
  <input id="api-url" style="width:400px;padding:8px;font-size:14px" value="https://api.meetropolis.s4.lmwow.de">
  <br><br>
  <button id="btn-health">Test /health</button>
  <button id="btn-login">Test /auth/login</button>
  <button id="btn-simple">Simple GET google.com</button>
  <pre id="api-result">Click a button to test</pre>

  <h2>4. Console Log</h2>
  <pre id="console-log"></pre>

  <script>
    // Capture console
    const logEl = document.getElementById('console-log');
    const oldLog = console.log;
    const oldError = console.error;
    function addLog(type, args) {
      const line = document.createElement('div');
      line.className = type === 'error' ? 'error' : 'info';
      line.textContent = '[' + type + '] ' + Array.from(args).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }
    console.log = function() { addLog('log', arguments); oldLog.apply(console, arguments); };
    console.error = function() { addLog('error', arguments); oldError.apply(console, arguments); };

    console.log('Debug page loaded');

    // 1. Tauri Detection
    const tauriInfo = document.getElementById('tauri-info');
    tauriInfo.textContent = JSON.stringify({
      hasTauri: !!window.__TAURI__,
      tauriKeys: window.__TAURI__ ? Object.keys(window.__TAURI__) : [],
      hasCore: !!window.__TAURI__?.core,
      hasInvoke: !!window.__TAURI__?.core?.invoke
    }, null, 2);

    // 2. Config from Rust
    const configInfo = document.getElementById('config-info');
    if (window.__TAURI__?.core?.invoke) {
      console.log('Loading config via invoke...');
      window.__TAURI__.core.invoke('get_config')
        .then(function(config) {
          console.log('Config loaded:', config);
          configInfo.innerHTML = '<span class="success">Config loaded:</span>\n' + JSON.stringify(config, null, 2);
        })
        .catch(function(e) {
          console.error('Config error:', e);
          configInfo.innerHTML = '<span class="error">Error: ' + e + '</span>';
        });
    } else {
      configInfo.innerHTML = '<span class="error">No Tauri invoke</span>';
    }

    // 3. API Tests
    const apiResult = document.getElementById('api-result');
    
    document.getElementById('btn-health').onclick = function() {
      const url = document.getElementById('api-url').value + '/health';
      console.log('Testing health:', url);
      apiResult.textContent = 'Testing ' + url + ' ...';
      
      fetch(url)
        .then(function(res) {
          console.log('Health response:', res.status);
          return res.text().then(function(text) {
            apiResult.innerHTML = '<span class="success">SUCCESS</span>\nStatus: ' + res.status + '\nBody: ' + text;
          });
        })
        .catch(function(e) {
          console.error('Health error:', e.name, e.message);
          apiResult.innerHTML = '<span class="error">FAILED: ' + e.name + ': ' + e.message + '</span>';
        });
    };

    document.getElementById('btn-login').onclick = function() {
      const url = document.getElementById('api-url').value + '/auth/login';
      console.log('Testing login:', url);
      apiResult.textContent = 'Testing ' + url + ' ...';
      
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: 'test@test.com', password: 'test' })
      })
        .then(function(res) {
          console.log('Login response:', res.status);
          return res.text().then(function(text) {
            apiResult.innerHTML = '<span class="success">Response</span>\nStatus: ' + res.status + '\nBody: ' + text;
          });
        })
        .catch(function(e) {
          console.error('Login error:', e.name, e.message);
          apiResult.innerHTML = '<span class="error">FAILED: ' + e.name + ': ' + e.message + '</span>';
        });
    };

    document.getElementById('btn-simple').onclick = function() {
      console.log('Testing simple GET...');
      apiResult.textContent = 'Testing https://httpbin.org/get ...';
      
      fetch('https://httpbin.org/get')
        .then(function(res) {
          console.log('Simple GET response:', res.status);
          return res.text().then(function(text) {
            apiResult.innerHTML = '<span class="success">SUCCESS</span>\nStatus: ' + res.status + '\nBody: ' + text.substring(0, 500);
          });
        })
        .catch(function(e) {
          console.error('Simple GET error:', e.name, e.message);
          apiResult.innerHTML = '<span class="error">FAILED: ' + e.name + ': ' + e.message + '</span>';
        });
    };

    console.log('Event handlers attached');
  </script>
</body>
</html>
