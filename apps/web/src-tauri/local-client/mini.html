<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Meetropolis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3b82f6;
      box-shadow: 0 0 8px #3b82f6;
    }
    .status-dot.dnd { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
    .status-dot.share { background: #22c55e; box-shadow: 0 0 8px #22c55e; }

    .speaking {
      font-size: 10px;
      color: #22c55e;
      background: rgba(34, 197, 94, 0.15);
      padding: 3px 10px;
      border-radius: 10px;
      text-align: center;
      margin: 0 12px 8px;
      display: none;
    }
    .speaking.visible { display: block; }

    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      flex: 1;
      align-items: center;
    }

    .btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 16px;
      transition: all 0.15s ease;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:active { transform: scale(0.95); }

    .btn-mic { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .btn-mic.on { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .btn-cam { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .btn-cam.on { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .btn-dnd { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .btn-dnd.on { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .footer {
      display: flex;
      justify-content: flex-end;
      padding: 8px 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2);
    }

    .btn-expand {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: rgba(59, 130, 246, 0.3);
      color: #60a5fa;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-expand:hover { background: rgba(59, 130, 246, 0.4); }
  </style>
</head>
<body>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Verbunden</span>
  </div>

  <div class="speaking" id="speaking"></div>

  <div class="controls">
    <button class="btn btn-mic" id="btnMic" title="Mikrofon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path id="micIcon" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.06 7.44-7 7.93V22h-2v-6.07z"/>
      </svg>
    </button>
    <button class="btn btn-cam" id="btnCam" title="Kamera">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path id="camIcon" d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
      </svg>
    </button>
    <button class="btn btn-dnd" id="btnDnd" title="Nicht stören">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
      </svg>
    </button>
  </div>

  <div class="footer">
    <button class="btn-expand" id="btnExpand" title="Zurück zur App (Cmd+M)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
        <path d="M21 11V3h-8l3.29 3.29-10 10L3 13v8h8l-3.29-3.29 10-10L21 11z"/>
      </svg>
      Öffnen
    </button>
  </div>

  <script>
    const invoke = window.__TAURI__?.invoke;
    const listen = window.__TAURI__?.event?.listen;

    // State
    let state = { mic: false, cam: false, dnd: false, share: false, online_count: 0, speaking_names: [] };

    // Elements
    const btnMic = document.getElementById('btnMic');
    const btnCam = document.getElementById('btnCam');
    const btnDnd = document.getElementById('btnDnd');
    const btnExpand = document.getElementById('btnExpand');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const speaking = document.getElementById('speaking');

    function updateUI() {
      // Mic button
      btnMic.classList.toggle('on', state.mic);
      btnMic.disabled = state.dnd;

      // Cam button
      btnCam.classList.toggle('on', state.cam);
      btnCam.disabled = state.dnd;

      // DND button
      btnDnd.classList.toggle('on', state.dnd);

      // Status
      statusDot.className = 'status-dot';
      if (state.dnd) {
        statusDot.classList.add('dnd');
        statusText.textContent = 'Nicht stören';
      } else if (state.share) {
        statusDot.classList.add('share');
        statusText.textContent = 'Teilt Bildschirm';
      } else {
        statusText.textContent = state.online_count + ' online';
      }

      // Speaking
      if (state.speaking_names.length > 0) {
        speaking.classList.add('visible');
        const names = state.speaking_names.slice(0, 2);
        speaking.textContent = '🎤 ' + names.join(', ') + (state.speaking_names.length > 2 ? ' +' + (state.speaking_names.length - 2) : '');
      } else {
        speaking.classList.remove('visible');
      }
    }

    // Button handlers
    btnMic.onclick = () => invoke?.('mini_av_action', { action: 'toggle_mic' });
    btnCam.onclick = () => invoke?.('mini_av_action', { action: 'toggle_cam' });
    btnDnd.onclick = () => invoke?.('mini_av_action', { action: 'toggle_dnd' });
    btnExpand.onclick = () => invoke?.('expand_from_mini');

    // Keyboard shortcut: Cmd+M to expand
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'm') {
        e.preventDefault();
        invoke?.('expand_from_mini');
      }
    });

    // Listen for AV status updates from main window
    listen?.('av-status-update', (event) => {
      state = event.payload;
      updateUI();
    });

    // Initial UI
    updateUI();
  </script>
</body>
</html>
