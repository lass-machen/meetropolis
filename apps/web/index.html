<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Office (Self-Hosted)</title>
    <link rel="icon" type="image/png" href="/brand/favicon.png" />
    <meta name="description" content="Self-hosted virtual office platform with spatial audio, video and a 2D world for small remote teams." />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f7fb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#111114" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
  </head>
  <body>
    <div id="root"></div>
    <!-- WebSocket Patch for WKWebView (Tauri) - MUST run BEFORE main bundle -->
    <script>
      (function() {
        // Only patch in Tauri (WKWebView)
        if (typeof window === 'undefined' || !window.__TAURI__) return;

        var OriginalWebSocket = window.WebSocket;
        if (!OriginalWebSocket) return;

        function PatchedWebSocket(url, protocols) {
          // If protocols is an object (not array, not string), extract the protocols array
          // This fixes Colyseus.js which passes { headers, protocols } to WebSocket
          if (protocols !== undefined && protocols !== null && typeof protocols === 'object' && !Array.isArray(protocols)) {
            console.log('[WS Patch] Object detected, extracting protocols from:', protocols);
            var actualProtocols = protocols.protocols;
            if (Array.isArray(actualProtocols) && actualProtocols.length > 0) {
              return new OriginalWebSocket(url, actualProtocols);
            } else {
              return new OriginalWebSocket(url);
            }
          }
          // Normal case
          if (protocols === undefined || protocols === null) {
            return new OriginalWebSocket(url);
          }
          return new OriginalWebSocket(url, protocols);
        }

        // Copy static properties
        PatchedWebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
        PatchedWebSocket.OPEN = OriginalWebSocket.OPEN;
        PatchedWebSocket.CLOSING = OriginalWebSocket.CLOSING;
        PatchedWebSocket.CLOSED = OriginalWebSocket.CLOSED;
        PatchedWebSocket.prototype = OriginalWebSocket.prototype;

        // Replace globally
        window.WebSocket = PatchedWebSocket;
        if (typeof globalThis !== 'undefined') {
          globalThis.WebSocket = PatchedWebSocket;
        }

        console.log('[WS Patch] WebSocket patched for WKWebView (pre-bundle)');
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
